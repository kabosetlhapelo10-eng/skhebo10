<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Send feedback to Motion Clothing about products and service.">
    <title>Motion Clothing | Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="images/Motion Clothing Logo.jpg" alt="Motion Clothing Logo" class="logo" width="115" height="139">
                <span class="brand-name">Motion Clothing</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="feedback.html">Feedback</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="page-header text-center">
        <div class="container">
            <h1>Customer Feedback</h1>
            <p>We value your opinion. Tell us about your experience.</p>
        </div>
    </header>

    <main>
        <section class="feedback-section">
            <div class="container">
                <div class="feedback-box">
                    <form id="feedbackForm">
                        <div class="mb-3">
                            <label class="form-label" for="feedbackName">Full Name</label>
                            <input id="feedbackName" name="name" type="text" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="feedbackEmail">Email Address</label>
                            <input id="feedbackEmail" name="email" type="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="rating">Rate Us</label>
                            <select id="rating" name="rating" class="form-select" required>
                                <option value="">Choose rating</option>
                                <option>5 - Excellent</option>
                                <option>4 - Very Good</option>
                                <option>3 - Good</option>
                                <option>2 - Fair</option>
                                <option>1 - Poor</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="feedbackMessage">Your Feedback</label>
                            <textarea id="feedbackMessage" name="feedback" class="form-control" rows="4" placeholder="Write your feedback here..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">Submit Feedback</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer text-center">
        <p>&copy; 2026 Motion Clothing. Gaborone, Botswana.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
